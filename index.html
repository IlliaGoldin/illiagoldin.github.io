<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <h1>SLEEPY PROGRAMMERS</h1>
    <div class="container text-align-center flex column">
        <div class="loading-wrapper">
            <h2 class="color-pink">Compiling better coffee<span class="loading-text"></span></h2>
        </div>
        <p class="color-pink">Launching soon</p>
    </div>
</body>

<script>
    const dotsElement = document.getElementById('dots');
    let count = 0;

    // Update the dots every 500 milliseconds
    setInterval(() => {
        // Cycles count through 0, 1, 2, 3
        count = (count + 1) % 4;
        dotsElement.textContent = '.'.repeat(count);
    }, 500);
</script>

</html>
